<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plancia Rocciamelone</title>
  <style>
    :root {
      --panel: rgba(15, 19, 27, 0.92);
      --panel-2: rgba(20, 26, 36, 0.92);
      --line: rgba(115, 157, 222, 0.22);
      --text: #eef4ff;
      --muted: #9aa9bf;
      --blue: #6ca9ff;
      --blue-2: #5bc0ff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(108,169,255,0.16), transparent 28%),
        radial-gradient(circle at bottom left, rgba(242,140,58,0.12), transparent 24%),
        linear-gradient(180deg, #0b1017 0%, #080b10 100%);
      color: var(--text);
    }
    .shell {
      width: 100vw;
      min-height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .left-tools, .right-tools {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .chip, .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font: 800 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .mode-chip {
      color: var(--blue-2);
      border-color: rgba(108,169,255,.25);
    }
    .stage-shell {
      position: relative;
      min-height: 0;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255,255,255,.03);
    }
    .viewport {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,.35);
      background: #000;
    }
    .viewport iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: 0;
      background: #000;
      transform-origin: top left;
      display: block;
    }

    body.mode-desktop-horizontal .viewport {
      width: min(100%, 1320px);
      aspect-ratio: 16 / 9;
    }
    body.mode-desktop-vertical .viewport {
      width: min(100%, 980px);
      aspect-ratio: 10 / 16;
      max-height: calc(100vh - 150px);
    }
    body.mode-mobile .viewport {
      width: min(100%, 430px);
      aspect-ratio: 9 / 19.5;
      max-height: calc(100vh - 150px);
    }

    @media (max-width: 900px) {
      .shell { padding: 12px; }
      .stage-shell { padding: 12px; }
      .viewport { width: 100% !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="left-tools">
        <a class="back-home" href="dashboard.html">← Dashboard</a>
        <div class="chip mode-chip" id="modeChip">Mode</div>
      </div>
      <div class="right-tools">
        <div class="chip">Adaptive layout</div>
      </div>
    </div>

    <div class="stage-shell">
      <div class="stage">
        <div class="viewport" id="viewport">
          <iframe
            id="planciaFrame"
            src="https://rawcdn.githack.com/goffredodonofrio/personale/b6153e5727ccf47c0304422b12349c7184935feb/plancia-rocciamelone.html"
            title="Plancia Rocciamelone"
          ></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE = {
      desktopHorizontal: { width: 1600, height: 900, label: 'Desktop orizzontale' },
      desktopVertical: { width: 1100, height: 1760, label: 'Desktop verticale' },
      mobile: { width: 430, height: 932, label: 'Mobile' }
    };

    const iframe = document.getElementById('planciaFrame');
    const viewport = document.getElementById('viewport');
    const modeChip = document.getElementById('modeChip');

    function getMode() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const portrait = h > w;

      if (w <= 900) return 'mobile';
      if (portrait) return 'desktopVertical';
      return 'desktopHorizontal';
    }

    function applyMode() {
      const mode = getMode();
      document.body.classList.remove('mode-desktop-horizontal', 'mode-desktop-vertical', 'mode-mobile');
      if (mode === 'desktopHorizontal') document.body.classList.add('mode-desktop-horizontal');
      if (mode === 'desktopVertical') document.body.classList.add('mode-desktop-vertical');
      if (mode === 'mobile') document.body.classList.add('mode-mobile');

      const base = BASE[mode];
      modeChip.textContent = base.label;

      requestAnimationFrame(() => {
        const rect = viewport.getBoundingClientRect();
        const scale = Math.min(rect.width / base.width, rect.height / base.height);
        const scaledWidth = base.width * scale;
        const scaledHeight = base.height * scale;
        iframe.style.width = base.width + 'px';
        iframe.style.height = base.height + 'px';
        iframe.style.transform = `scale(${scale})`;
        iframe.style.left = ((rect.width - scaledWidth) / 2) + 'px';
        iframe.style.top = ((rect.height - scaledHeight) / 2) + 'px';
      });
    }

    window.addEventListener('resize', applyMode);
    window.addEventListener('orientationchange', applyMode);
    iframe.addEventListener('load', applyMode);
    applyMode();
  </script>
</body>
</html>
