<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cockpit Salute</title>
  <style>
    :root {
      --panel: rgba(15, 19, 27, 0.92);
      --panel-2: rgba(20, 26, 36, 0.92);
      --line: rgba(115, 157, 222, 0.22);
      --text: #eef4ff;
      --muted: #9aa9bf;
      --blue: #6ca9ff;
      --blue-2: #5bc0ff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(108,169,255,0.16), transparent 28%),
        radial-gradient(circle at bottom left, rgba(242,140,58,0.12), transparent 24%),
        linear-gradient(180deg, #0b1017 0%, #080b10 100%);
      color: var(--text);
    }
    .shell {
      min-height: 100vh;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .page-kicker {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .frame-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 14px;
    }
    .frame {
      width: 100%;
      height: calc(100vh - 92px);
      min-height: 760px;
      border: 0;
      display: block;
      border-radius: 20px;
      background: #fff;
    }
    @media (max-width: 700px) {
      .shell { padding: 14px; }
      .frame-wrap { padding: 10px; border-radius: 22px; }
      .frame { height: calc(100vh - 82px); min-height: 620px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a class="back-home" href="dashboard.html">← Dashboard</a>
      <div class="page-kicker">Cockpit salute</div>
    </div>
    <div class="frame-wrap">
      <iframe class="frame" src="https://rawcdn.githack.com/goffredodonofrio/personale/b6153e5727ccf47c0304422b12349c7184935feb/cockpit-salute.html" title="Cockpit Salute"></iframe>
    </div>
  </div>
</body>
</html>
