<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard personale</title>
  <style>
    :root {
      --panel: rgba(15, 19, 27, 0.92);
      --panel-2: rgba(20, 26, 36, 0.92);
      --line: rgba(115, 157, 222, 0.22);
      --text: #eef4ff;
      --muted: #9aa9bf;
      --blue: #6ca9ff;
      --blue-2: #5bc0ff;
      --amber: #f4c242;
      --orange: #f28c3a;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow-x: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(108,169,255,0.16), transparent 28%),
        radial-gradient(circle at bottom left, rgba(242,140,58,0.12), transparent 24%),
        linear-gradient(180deg, #0b1017 0%, #080b10 100%);
      color: var(--text);
    }
    .shell {
      max-width: 1380px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 22px;
    }
    .status-box {
      min-width: 240px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .status-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .status-time {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -.04em;
      margin-top: 8px;
      color: var(--blue);
    }
    .status-date {
      margin-top: 6px;
      color: var(--text);
      font-size: 14px;
      opacity: .9;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 10px 0 14px;
      flex-wrap: wrap;
    }
    .section-head h2 {
      margin: 0;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
    }
    .section-head span {
      color: var(--muted);
      font-size: 13px;
    }
    .carousel-shell { display: grid; gap: 10px; }
    .carousel-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .carousel-meta {
      font: 800 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .carousel-buttons { display: flex; gap: 8px; }
    .carousel-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: 800 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .carousel-btn:hover { background: rgba(255,255,255,.08); }
    .carousel-window { overflow: hidden; position: relative; cursor: grab; }
    .carousel-window.dragging { cursor: grabbing; }
    .carousel-track {
      display: flex;
      gap: 0;
      transition: transform .35s cubic-bezier(.22,.8,.36,1);
      will-change: transform;
      touch-action: pan-y;
      user-select: none;
    }
    .carousel-track.is-dragging { transition: none; }
    .carousel-slide { min-width: 100%; }
    .slide-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 2px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
      border: 0;
      cursor: pointer;
      padding: 0;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .carousel-dot.active {
      background: var(--blue);
      box-shadow: 0 0 0 4px rgba(108,169,255,.12);
      transform: scale(1.12);
    }
    .project-card {
      position: relative;
      overflow: hidden;
      padding: 22px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .project-card:hover {
      transform: translateY(-4px);
      border-color: rgba(108,169,255,0.46);
      box-shadow: 0 24px 60px rgba(0,0,0,.42);
    }
    .accent-blue::before,
    .accent-gold::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      border-radius: 28px 0 0 28px;
    }
    .accent-blue::before { background: linear-gradient(180deg, var(--blue-2) 0%, var(--blue) 100%); }
    .accent-gold::before { background: linear-gradient(180deg, var(--amber) 0%, var(--orange) 100%); }
    .project-top { padding-left: 12px; }
    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--muted);
    }
    .project-title {
      font-size: clamp(28px, 4vw, 42px);
      line-height: .98;
      letter-spacing: -.05em;
      margin: 0;
    }
    .project-text {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 46ch;
    }
    .project-cta {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      width: fit-content;
    }
    @media (max-width: 1100px) {
      .slide-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .shell { padding: 22px 14px 40px; }
      .project-card { border-radius: 22px; min-height: unset; }
      .project-title { font-size: 32px; }
      .carousel-controls { align-items: flex-start; flex-direction: column; }
      .slide-grid { grid-template-columns: 1fr; }
      .carousel-buttons { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="status-box">
        <div class="status-label">Local time · Torino</div>
        <div class="status-time" id="clock">--:--</div>
        <div class="status-date" id="date">--</div>
      </div>
    </div>

    <div class="section-head">
      <h2>Progetti</h2>
      <span>Accessi rapidi ai moduli già presenti</span>
    </div>

    <div class="carousel-shell">
      <div class="carousel-controls">
        <div class="carousel-meta" id="projectsMeta">Visualizzazione progetti</div>
        <div class="carousel-buttons">
          <button class="carousel-btn" type="button" id="projectsPrev">← Prev</button>
          <button class="carousel-btn" type="button" id="projectsNext">Next →</button>
        </div>
      </div>
      <div class="carousel-window" id="projectsWindow"><div class="carousel-track" id="projectsTrack"></div></div>
      <div class="carousel-dots" id="projectsDots"></div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const isMobile = window.matchMedia('(max-width: 700px)').matches;
    const projectCards = [
      `
      <a class="project-card accent-blue" href="plancia-rocciamelone.html">
        <div class="project-top">
          <div class="tag-row">
            <span class="tag">home</span>
            <span class="tag">smart home</span>
            <span class="tag">meteo + agenda</span>
          </div>
          <p class="project-title">Home</p>
          <div class="project-text">La home operativa di Rocciamelone: un pannello unico per vedere ora, meteo, agenda e controlli smart home in una vista rapida e quotidiana.</div>
        </div>
        <div>
          <div class="project-cta">Apri progetto →</div>
        </div>
      </a>`,
      `
      <a class="project-card accent-gold" href="cockpit-salute.html">
        <div class="project-top">
          <div class="tag-row">
            <span class="tag">health</span>
            <span class="tag">alimentazione</span>
            <span class="tag">dashboard</span>
          </div>
          <p class="project-title">Cockpit<br>Salute</p>
          <div class="project-text">Il file allegato è stato trasformato in una pagina dedicata e collegato alla dashboard: piano alimentare settimanale, lista della spesa e quadro sanitario nello stesso progetto.</div>
        </div>
        <div>
          <div class="project-cta">Apri progetto →</div>
        </div>
      </a>`
    ];

    function makePairs(items) {
      const pairs = [];
      for (let i = 0; i < items.length; i += 2) pairs.push(items.slice(i, i + 2));
      return pairs;
    }

    function mobileify(slides) {
      return slides.map(pair => pair.map(x => [x])).flat();
    }

    function setupCarousel(trackId, windowId, metaId, prevId, nextId, dotsId, items) {
      const track = document.getElementById(trackId);
      const viewport = document.getElementById(windowId);
      const meta = document.getElementById(metaId);
      const dots = document.getElementById(dotsId);
      const baseSlides = makePairs(items);
      const slides = isMobile ? mobileify(baseSlides) : baseSlides;
      let index = 0;
      let startX = 0;
      let dragOffset = 0;
      let dragging = false;

      function build() {
        track.innerHTML = '';
        slides.forEach(group => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          const grid = document.createElement('div');
          grid.className = 'slide-grid';
          group.forEach(item => {
            const value = Array.isArray(item) ? item[0] : item;
            const holder = document.createElement('div');
            holder.innerHTML = value;
            grid.appendChild(holder.firstElementChild);
          });
          slide.appendChild(grid);
          track.appendChild(slide);
        });
        dots.innerHTML = '';
        slides.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.className = 'carousel-dot';
          dot.type = 'button';
          dot.addEventListener('click', () => { index = i; dragOffset = 0; update(true); });
          dots.appendChild(dot);
        });
      }

      function update(animated = true) {
        viewport.classList.toggle('dragging', !animated);
        track.classList.toggle('is-dragging', !animated);
        track.style.transition = animated ? 'transform .35s cubic-bezier(.22,.8,.36,1)' : 'none';
        track.style.transform = `translate3d(calc(-${index * 100}% + ${dragOffset}px),0,0)`;
        meta.textContent = `${index + 1} / ${slides.length}`;
        [...dots.children].forEach((dot, i) => dot.classList.toggle('active', i === index));
      }

      function goPrev() { index = (index - 1 + slides.length) % slides.length; dragOffset = 0; update(true); }
      function goNext() { index = (index + 1) % slides.length; dragOffset = 0; update(true); }

      document.getElementById(prevId).onclick = goPrev;
      document.getElementById(nextId).onclick = goNext;

      const startDrag = (clientX) => {
        dragging = true;
        startX = clientX;
        dragOffset = 0;
        update(false);
      };
      const moveDrag = (clientX) => {
        if (!dragging) return;
        dragOffset = clientX - startX;
        update(false);
      };
      const endDrag = (clientX) => {
        if (!dragging) return;
        const diff = clientX - startX;
        dragging = false;
        if (Math.abs(diff) > 50) {
          if (diff < 0) index = (index + 1) % slides.length;
          else index = (index - 1 + slides.length) % slides.length;
        }
        dragOffset = 0;
        update(true);
      };

      viewport.addEventListener('mousedown', e => startDrag(e.clientX));
      window.addEventListener('mousemove', e => moveDrag(e.clientX));
      window.addEventListener('mouseup', e => endDrag(e.clientX));
      viewport.addEventListener('mouseleave', e => { if (dragging) endDrag(e.clientX); });

      viewport.addEventListener('touchstart', e => startDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchmove', e => moveDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchend', e => endDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchcancel', () => { dragging = false; dragOffset = 0; update(true); }, { passive: true });

      build();
      update(true);
    }

    setupCarousel('projectsTrack', 'projectsWindow', 'projectsMeta', 'projectsPrev', 'projectsNext', 'projectsDots', projectCards);
  </script>
</body>
</html>
