<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard personale · Goffredo d'Onofrio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #07090e;
      --bg-1: #0b1017;
      --bg-2: #0f1521;
      --panel: rgba(15, 19, 27, 0.92);
      --panel-2: rgba(20, 26, 36, 0.92);
      --line: rgba(115, 157, 222, 0.22);
      --line-strong: rgba(115, 157, 222, 0.42);
      --text: #eef4ff;
      --muted: #9aa9bf;
      --muted-2: #6b7a90;
      --blue: #6ca9ff;
      --blue-2: #5bc0ff;
      --blue-soft: rgba(108,169,255,0.12);
      --amber: #f4c242;
      --orange: #f28c3a;
      --gold-soft: rgba(244,194,66,0.14);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --shadow-strong: 0 32px 70px rgba(0, 0, 0, 0.55);
      --radius: 28px;
      --radius-sm: 14px;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow-x: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background-color: var(--bg-0);
      background-image:
        radial-gradient(1100px 700px at 88% -10%, rgba(108,169,255,0.18), transparent 60%),
        radial-gradient(900px 600px at -10% 110%, rgba(242,140,58,0.13), transparent 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      background-attachment: fixed;
      position: relative;
    }
    /* micro-grid overlay to give a cockpit feel */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(115,157,222,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(115,157,222,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 40%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 30%, transparent 80%);
      z-index: 0;
    }
    .shell {
      position: relative;
      z-index: 1;
      max-width: 1380px;
      margin: 0 auto;
      padding: 36px 22px 56px;
    }

    /* ===== HEADER / HERO ===== */
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 14px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%);
      color: #061022;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -.02em;
      box-shadow: 0 8px 24px rgba(108,169,255,.35);
      flex-shrink: 0;
    }
    .brand-text { min-width: 0; }
    .brand-eyebrow {
      font: 800 10px/1 var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 6px;
    }
    .brand-title {
      margin: 0;
      font-size: clamp(18px, 2.2vw, 22px);
      letter-spacing: -.02em;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand-title em {
      font-style: normal;
      color: var(--blue);
    }
    .status-box {
      min-width: 220px;
      padding: 10px 16px;
      border-radius: 16px;
      background: rgba(8, 12, 20, 0.55);
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 14px;
      align-items: center;
    }
    .status-box::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue-2);
      grid-row: span 2;
      box-shadow: 0 0 0 4px rgba(91,192,255,.14), 0 0 12px rgba(91,192,255,.6);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .status-label {
      color: var(--muted-2);
      font: 800 10px/1 var(--mono);
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .status-time {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--text);
    }
    .status-date {
      grid-column: 2;
      color: var(--muted);
      font-size: 12px;
    }

    /* ===== HERO BLOCK ===== */
    .hero {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 24px;
      margin-bottom: 36px;
      align-items: end;
    }
    .hero-copy {
      padding: 4px 4px 4px 2px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font: 800 11px/1 var(--mono);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .hero-eyebrow::before {
      content: "";
      display: block;
      width: 28px;
      height: 1px;
      background: var(--blue);
      opacity: .7;
    }
    .hero-title {
      margin: 0;
      font-size: clamp(36px, 5.6vw, 62px);
      line-height: .98;
      letter-spacing: -.045em;
      font-weight: 800;
    }
    .hero-title .accent {
      background: linear-gradient(90deg, var(--blue) 0%, var(--blue-2) 60%, var(--amber) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-lede {
      margin: 16px 0 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .hero-meta {
      justify-self: end;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      text-align: right;
    }
    .hero-meta .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      color: var(--muted);
      font: 700 11px/1 var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .hero-meta .chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }
    .hero-meta .chip .dot.blue {
      background: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    /* ===== SECTION HEAD ===== */
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 8px 0 18px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    .section-head .title-group {
      display: flex;
      align-items: baseline;
      gap: 14px;
      min-width: 0;
    }
    .section-head .section-num {
      font: 800 11px/1 var(--mono);
      letter-spacing: .2em;
      color: var(--blue);
    }
    .section-head h2 {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .22em;
      color: var(--text);
      font-weight: 800;
    }
    .section-head .section-sub {
      color: var(--muted);
      font-size: 13px;
    }

    /* ===== CAROUSEL ===== */
    .carousel-shell { display: grid; gap: 14px; }
    .carousel-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .carousel-meta {
      font: 700 11px/1 var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .carousel-meta::before {
      content: "";
      width: 22px;
      height: 1px;
      background: var(--line-strong);
    }
    .carousel-buttons { display: flex; gap: 8px; }
    .carousel-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      font: 800 11px var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .carousel-btn:hover {
      background: rgba(108,169,255,.10);
      border-color: var(--line-strong);
    }
    .carousel-btn:active { transform: translateY(1px); }
    .carousel-window { overflow: hidden; position: relative; cursor: grab; }
    .carousel-window.dragging { cursor: grabbing; }
    .carousel-track {
      display: flex;
      gap: 0;
      transition: transform .35s cubic-bezier(.22,.8,.36,1);
      will-change: transform;
      touch-action: pan-y;
      user-select: none;
    }
    .carousel-track.is-dragging { transition: none; }
    .carousel-slide { min-width: 100%; padding: 2px; }
    .slide-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .carousel-dot {
      width: 26px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 0;
      cursor: pointer;
      padding: 0;
      transition: background .2s ease, transform .2s ease, width .2s ease;
    }
    .carousel-dot:hover { background: rgba(255,255,255,.2); }
    .carousel-dot.active {
      background: var(--blue);
      width: 40px;
      box-shadow: 0 0 0 3px rgba(108,169,255,.12);
    }

    /* ===== PROJECT CARDS ===== */
    .project-card {
      position: relative;
      overflow: hidden;
      padding: 18px 18px 16px 22px;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius);
      background:
        radial-gradient(500px 260px at 88% -10%, rgba(108,169,255,.08), transparent 70%),
        linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }
    .project-card:hover {
      transform: translateY(-5px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-strong);
    }
    .project-card::after {
      /* faint dotted matrix in background */
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 30%, #000 60%, transparent 100%);
      opacity: .35;
    }
    .accent-blue::before,
    .accent-gold::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      border-radius: 28px 0 0 28px;
    }
    .accent-blue::before {
      background: linear-gradient(180deg, var(--blue-2) 0%, var(--blue) 100%);
      box-shadow: 0 0 24px rgba(108,169,255,.45);
    }
    .accent-gold::before {
      background: linear-gradient(180deg, var(--amber) 0%, var(--orange) 100%);
      box-shadow: 0 0 24px rgba(242,140,58,.38);
    }
    /* index badge top-right */
    .accent-blue .project-index,
    .accent-gold .project-index {
      position: absolute;
      top: 16px;
      right: 16px;
      font: 800 9px/1 var(--mono);
      letter-spacing: .18em;
      color: var(--muted-2);
      z-index: 2;
    }
    /* futuristic stylized icon */
    .project-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      height: 64px;
      pointer-events: none;
      opacity: .78;
      z-index: 0;
    }
    .project-icon svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .accent-blue .project-icon { color: var(--blue); filter: drop-shadow(0 0 12px rgba(108,169,255,.35)); }
    .accent-gold .project-icon { color: var(--amber); filter: drop-shadow(0 0 12px rgba(244,194,66,.30)); }
    .project-icon .bg { opacity: .18; }
    .project-icon .mid { opacity: .55; }
    .project-icon .hi { opacity: 1; }
    .project-card:hover .project-icon { opacity: 1; }
    .project-icon { transition: opacity .22s ease; }
    .project-top { position: relative; z-index: 1; }
    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font: 800 9px/1 var(--mono);
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.025);
      color: var(--muted);
    }
    .accent-blue .tag:first-child {
      color: var(--blue);
      border-color: rgba(108,169,255,.35);
      background: var(--blue-soft);
    }
    .accent-gold .tag:first-child {
      color: var(--amber);
      border-color: rgba(244,194,66,.4);
      background: var(--gold-soft);
    }
    .project-title {
      font-size: clamp(22px, 2vw, 28px);
      line-height: 1;
      letter-spacing: -.035em;
      margin: 0;
      font-weight: 800;
      padding-right: 56px;
    }
    .project-text {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.6;
      max-width: 46ch;
      position: relative;
      z-index: 1;
    }
    .project-cta {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      color: var(--text);
      font: 800 9px/1 var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      width: fit-content;
      position: relative;
      z-index: 1;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .project-card:hover .project-cta {
      background: rgba(108,169,255,.12);
      border-color: rgba(108,169,255,.45);
      transform: translateX(3px);
    }
    .accent-gold:hover .project-cta {
      background: rgba(244,194,66,.12);
      border-color: rgba(244,194,66,.45);
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 48px;
      padding: 22px 2px 6px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted-2);
      font: 700 11px/1.4 var(--mono);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .footer .footer-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }
    .footer .footer-mark .mini {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1180px) {
      .slide-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .slide-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .shell { padding: 24px 14px 40px; }
      .topbar { grid-template-columns: 1fr; gap: 14px; }
      .status-box { min-width: 0; }
      .slide-grid { grid-template-columns: 1fr; }
      .project-card { border-radius: 22px; padding: 20px 20px 18px 24px; }
      .carousel-controls { align-items: flex-start; flex-direction: column; }
      .carousel-buttons { display: none; }
      .section-head { padding-top: 14px; }
      .footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">G·D</div>
        <div class="brand-text">
          <div class="brand-eyebrow">Personale</div>
          <h1 class="brand-title">Dashboard <em>Goffredo d'Onofrio</em></h1>
        </div>
      </div>
      <div class="status-box" role="status" aria-live="polite">
        <span class="status-label">Torino · Local</span>
        <span class="status-time" id="clock">--:--</span>
        <span class="status-date" id="date">--</span>
      </div>
    </header>

    <div class="section-head">
      <div class="title-group">
        <span class="section-num">01</span>
        <h2>Progetti</h2>
      </div>
      <span class="section-sub">Accessi rapidi ai moduli già presenti</span>
    </div>

    <div class="carousel-shell">
      <div class="carousel-controls">
        <div class="carousel-meta" id="projectsMeta">Visualizzazione progetti</div>
        <div class="carousel-buttons">
          <button class="carousel-btn" type="button" id="projectsPrev">← Prev</button>
          <button class="carousel-btn" type="button" id="projectsNext">Next →</button>
        </div>
      </div>
      <div class="carousel-window" id="projectsWindow"><div class="carousel-track" id="projectsTrack"></div></div>
      <div class="carousel-dots" id="projectsDots"></div>
    </div>

    <footer class="footer">
      <div class="footer-mark"><span class="mini"></span></div>
    </footer>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const isMobile = window.matchMedia('(max-width: 560px)').matches;
    const projectCards = [
      `
      <a class="project-card accent-blue" href="plancia-rocciamelone.html">
        <span class="project-index">01 / SMART HOME</span>
        <div class="project-icon" aria-hidden="true">
          <svg viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- ambient halo -->
            <circle class="bg" cx="48" cy="54" r="36" fill="currentColor" stroke="none"/>
            <!-- wifi signal arcs (the "smart" layer) -->
            <path class="bg" d="M28 46 Q48 28 68 46"/>
            <path class="mid" d="M33 46 Q48 32 63 46"/>
            <path class="hi" d="M40 46 Q48 38 56 46"/>
            <circle class="hi" cx="48" cy="46" r="2.4" fill="currentColor" stroke="none"/>
            <!-- house roof -->
            <path class="hi" d="M22 62 L48 44 L74 62"/>
            <!-- house walls -->
            <path class="hi" d="M28 60 L28 78 L68 78 L68 60"/>
            <!-- door -->
            <path class="hi" d="M41 78 L41 66 Q41 63 44.5 63 L51.5 63 Q55 63 55 66 L55 78"/>
            <!-- left window -->
            <rect class="mid" x="32" y="64" width="7" height="7" rx="1.5"/>
            <!-- right window -->
            <rect class="mid" x="57" y="64" width="7" height="7" rx="1.5"/>
            <!-- smart lock pulse -->
            <circle class="mid" cx="56" cy="71" r="1.6" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="project-top">
          <div class="tag-row">
            <span class="tag">home</span>
            <span class="tag">smart home</span>
            <span class="tag">meteo + agenda</span>
          </div>
          <p class="project-title">Smart<br>Home</p>
        </div>
        <div>
          <div class="project-cta">Apri progetto →</div>
        </div>
      </a>`,
      `
      <a class="project-card accent-gold" href="cockpit-salute.html">
        <span class="project-index">02 / HEALTH</span>
        <div class="project-icon" aria-hidden="true">
          <svg viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- heart glow fill -->
            <path class="bg" d="M48 80 C24 62 12 48 12 34 C12 22 20 16 30 16 C37 16 44 21 48 29 C52 21 59 16 66 16 C76 16 84 22 84 34 C84 48 72 62 48 80 Z" fill="currentColor" stroke="none"/>
            <!-- heart outline -->
            <path class="mid" d="M48 74 C28 56 18 44 18 33 C18 24 23 21 30 21 C36 21 42 26 48 34 C54 26 60 21 66 21 C73 21 78 24 78 33 C78 44 68 56 48 74 Z"/>
            <!-- ECG line across heart -->
            <path class="hi" d="M14 50 L28 50 L33 36 L40 64 L46 38 L50 50 L58 50 L82 50"/>
            <circle class="hi" cx="14" cy="50" r="2.2" fill="currentColor" stroke="none"/>
            <circle class="hi" cx="82" cy="50" r="2.2" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="project-top">
          <div class="tag-row">
            <span class="tag">health</span>
            <span class="tag">alimentazione</span>
            <span class="tag">dashboard</span>
          </div>
          <p class="project-title">Cockpit<br>Salute</p>
        </div>
        <div>
          <div class="project-cta">Apri progetto →</div>
        </div>
      </a>`
    ];

    function makeGroups(items, size) {
      const groups = [];
      for (let i = 0; i < items.length; i += size) groups.push(items.slice(i, i + size));
      return groups;
    }

    function mobileify(slides) {
      return slides.map(group => group.map(x => [x])).flat();
    }

    function setupCarousel(trackId, windowId, metaId, prevId, nextId, dotsId, items) {
      const track = document.getElementById(trackId);
      const viewport = document.getElementById(windowId);
      const meta = document.getElementById(metaId);
      const dots = document.getElementById(dotsId);
      const baseSlides = makeGroups(items, 4);
      const slides = isMobile ? mobileify(baseSlides) : baseSlides;
      let index = 0;
      let startX = 0;
      let dragOffset = 0;
      let dragging = false;

      function build() {
        track.innerHTML = '';
        slides.forEach(group => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          const grid = document.createElement('div');
          grid.className = 'slide-grid';
          group.forEach(item => {
            const value = Array.isArray(item) ? item[0] : item;
            const holder = document.createElement('div');
            holder.innerHTML = value;
            grid.appendChild(holder.firstElementChild);
          });
          slide.appendChild(grid);
          track.appendChild(slide);
        });
        dots.innerHTML = '';
        slides.forEach((_, i) => {
          const dot = document.createElement('button');
          dot.className = 'carousel-dot';
          dot.type = 'button';
          dot.addEventListener('click', () => { index = i; dragOffset = 0; update(true); });
          dots.appendChild(dot);
        });
      }

      function update(animated = true) {
        viewport.classList.toggle('dragging', !animated);
        track.classList.toggle('is-dragging', !animated);
        track.style.transition = animated ? 'transform .35s cubic-bezier(.22,.8,.36,1)' : 'none';
        track.style.transform = `translate3d(calc(-${index * 100}% + ${dragOffset}px),0,0)`;
        meta.textContent = `${String(index + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
        [...dots.children].forEach((dot, i) => dot.classList.toggle('active', i === index));
      }

      function goPrev() { index = (index - 1 + slides.length) % slides.length; dragOffset = 0; update(true); }
      function goNext() { index = (index + 1) % slides.length; dragOffset = 0; update(true); }

      document.getElementById(prevId).onclick = goPrev;
      document.getElementById(nextId).onclick = goNext;

      const startDrag = (clientX) => {
        dragging = true;
        startX = clientX;
        dragOffset = 0;
        update(false);
      };
      const moveDrag = (clientX) => {
        if (!dragging) return;
        dragOffset = clientX - startX;
        update(false);
      };
      const endDrag = (clientX) => {
        if (!dragging) return;
        const diff = clientX - startX;
        dragging = false;
        if (Math.abs(diff) > 50) {
          if (diff < 0) index = (index + 1) % slides.length;
          else index = (index - 1 + slides.length) % slides.length;
        }
        dragOffset = 0;
        update(true);
      };

      viewport.addEventListener('mousedown', e => startDrag(e.clientX));
      window.addEventListener('mousemove', e => moveDrag(e.clientX));
      window.addEventListener('mouseup', e => endDrag(e.clientX));
      viewport.addEventListener('mouseleave', e => { if (dragging) endDrag(e.clientX); });

      viewport.addEventListener('touchstart', e => startDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchmove', e => moveDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchend', e => endDrag(e.changedTouches[0].clientX), { passive: true });
      viewport.addEventListener('touchcancel', () => { dragging = false; dragOffset = 0; update(true); }, { passive: true });

      build();
      update(true);
    }

    setupCarousel('projectsTrack', 'projectsWindow', 'projectsMeta', 'projectsPrev', 'projectsNext', 'projectsDots', projectCards);
  </script>
</body>
</html>
